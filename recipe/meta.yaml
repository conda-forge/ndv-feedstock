{% set name = "ndv" %}
{% set version = "0.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ndv-{{ version }}.tar.gz
  sha256: 899b08f2911f83ea4a4b522c64d56ea79141bde56f02c0fe86ed2bd022b63d2a

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >={{ python_min }}
    - cmap >=0.3
    - numpy >=1.26
    - psygnal >=0.12
    - pydantic >=2.10
    - typing_extensions >=4.10
    - ihist >=0.1.3

test:
  imports:
    - ndv
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Simple, fast-loading, n-dimensional array viewer.
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  home: https://github.com/pyapp-kit/ndv
  doc_url: https://pyapp-kit.github.io/ndv/latest/

extra:
  recipe-maintainers:
    - tlambert03
    - gselzer
